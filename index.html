<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종합 심리분석 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; scroll-behavior: smooth; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased pb-20">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="font-bold text-xl text-indigo-600">Psychology Lab</span>
            <div class="flex gap-4">
                <button onclick="showTest('big5')" class="text-sm font-medium hover:text-indigo-600">Big5 검사</button>
                <button onclick="showTest('mbti')" class="text-sm font-medium hover:text-indigo-600">MBTI 검사</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-10">
        
        <section id="section-big5" class="test-section">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold mb-2">Big5 성격 60문항 검사</h1>
                <p class="text-slate-500">평소 자신의 모습에 가장 가까운 숫자를 선택하세요.</p>
            </div>
            
            <form id="big5-form" class="bg-white shadow-sm border rounded-2xl p-6 md:p-10 space-y-8">
                <div id="big5-questions" class="space-y-6"></div>
                <div class="pt-10 text-center">
                    <button type="button" onclick="calculateBig5()" class="bg-indigo-600 text-white px-10 py-4 rounded-full font-bold text-lg hover:bg-indigo-700 shadow-lg transition transform hover:scale-105">결과 분석하기</button>
                </div>
            </form>
        </section>

        <section id="section-mbti" class="test-section hidden-section">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold mb-2">나의 성격유형(MBTI) 찾기</h1>
                <p class="text-slate-500">양쪽 문장 중 내 성격에 더 가까운 쪽에 체크하세요.</p>
            </div>
            <form id="mbti-form" class="bg-white shadow-sm border rounded-2xl p-6 md:p-10 space-y-6">
                <div id="mbti-questions" class="space-y-4"></div>
                <div class="pt-10 text-center">
                    <button type="button" onclick="calculateMBTI()" class="bg-emerald-600 text-white px-10 py-4 rounded-full font-bold text-lg hover:bg-emerald-700 shadow-lg">결과 확인하기</button>
                </div>
            </form>
        </section>

        <div id="report-area" class="hidden-section mt-10 space-y-10">
            <div id="report-capture" class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl border border-slate-100">
                <div id="report-content"></div>
                <div class="mt-10 h-80"><canvas id="resultChart"></canvas></div>
                <div id="archetype-card" class="mt-10"></div>
            </div>
            <div class="flex justify-center gap-4">
                <button onclick="saveReport()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold shadow-md hover:bg-slate-900 transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    내 리포트 저장하기
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- 데이터 정의 ---
        const big5Questions = [
            "나는 걱정하는 사람이 아니다.", "나는 주위에 사람들이 많이 있는 것을 좋아 한다.", "나는 공상을 하면서 시간을 낭비하는 것을 좋아하지 않는다.", "나는 만나는 모든 사람들에게 공손하려고 노력한다.", "나는 내 물건들을 깨끗하고 정리된 상태로 간수한다.",
            "나는 자주 다른 사람들보다 열등하다고 느낀다.", "나는 잘 웃는 편이다.", "일단 일을 제대로 하는 방법을 찾으면, 나는 그러한 방식으로만 한다.", "나는 내 가족이나 동료들과 자주 논쟁을 한다.", "나는 정해진 시간에 일을 끝내기 위해서 자신을 잘 조절한다.",
            "심한 스트레스를 받을 때 내 자신이 혼란에 빠지는 느낌이 든다.", "나는 내 자신이 특별히 낙천적이라고 생각하지 않는다.", "나는 예술과 자연에서 찾을 수 있는 경향성에 대해 많은 흥미를 갖는다.", "내가 이기적이고 자기중심적이라고 생각하는 사람들이 있다.", "나는 그다지 일을 신중하게 처리 하는 사람이 아니다.",
            "나는 외로움이나 우울함을 거의 느끼지 않는다.", "나는 사람들과 대화하는 것을 매우 즐긴다.", "학생들에게 논쟁이 되는 강연을 듣게 하는 것은 판단을 흐리게 할 뿐이다.", "나는 다른 사람과 경쟁하기 보다는 협력하는 것을 좋아 한다.", "나는 나에게 주어진 모든 일들을 신중하게 처리하려고 노력한다.",
            "나는 자주 긴장하고 신경이 예민해진다.", "나는 활동적인 장소에 있는 것을 좋아한다.", "나는 시를 읽어도 거의 또는 전혀 감동받지 못한다.", "나는 다른 사람의 의도에 대해서 냉소적이거나 의심하는 경향이 있다.", "나는 분명한 목표를 가지고 있고 체계적으로 노력한다.",
            "나는 때때로 전혀 가치 없는 사람이라고 느낀다.", "나는 대체로 혼자 일하는 것을 좋아한다.", "나는 새로운 음식과 외국 음식을 자주 먹어본다.", "허용한다면 대부분의 사람들이 나를 이용할 것이라고 생각 한다.", "일을 시작하기 전에 마음을 준비하기 위해 많은 시간을 낭비한다.",
            "나는 두려움이나 불안감을 거의 느끼지 않는다.", "나는 에너지가 넘치는 것을 자주 느낀다.", "나는 여러 상황이 주는 분위기나 느낌을 잘 인식하지 못한다.", "내가 아는 대부분의 사람들은 나를 좋아한다.", "나는 나의 목표를 달성하기 위해 열심히 노력한다.",
            "사람들이 나를 대하는 태도 때문에 나는 자주 화가 난다.", "나는 쾌활하고 활기찬 사람이다.", "도덕적 문제에 대한 결정은 종교 지도자의 의견을 따라야 한다고 믿는다.", "어떤 사람들은 내가 냉정하고 계산적이라고 생각한다.", "나는 한번 결심 하면, 그 일을 끝까지 추진한다.",
            "일이 잘못될 때 나는 자주 낙담하고 포기하고 싶어진다.", "나는 쾌활한 낙천주의자가 아니다.", "때때로 예술 작품을 보면 강한 감동을 받고 흥분하게 된다.", "나는 주장이 강하고 완고하다.", "때때로 다른 사람들은 나를 신뢰하거나 의지하기 어렵다.",
            "나는 거의 슬퍼하거나 우울해하지 않는다.", "내 생활은 매우 바쁘게 진행된다.", "나는 우주와 인간의 본질을 다루는 주제에 대해 별로 관심이 없다.", "나는 대체로 사람들을 배려하고 친절하게 대하려고 노력한다.", "나는 항상 일이 이루어지도록 효율적으로 일을 하는 사람이다.",
            "나는 자주 무기력함을 느끼고, 다른 사람이 해결 해주기 바란다.", "나는 매우 활동적인 사람이다.", "나는 지적 호기심이 많다.", "내가 어떤 사람을 싫어하면 그 사람에게 직접 표현한다.", "나는 정리 정돈 하면서 사는 것이 안 된다.",
            "나는 때때로 수치스러움 때문에 어디로든 숨고 싶다.", "나는 사람들을 지도하기보다 내 자신의 길을 가는 것이 더 좋다.", "나는 이론적이고 추상적인 생각하기를 자주 즐긴다.", "나는 내가 원하는 것을 얻기 위해 필요하다면 사람들을 이용할 수 있다.", "나는 내가 하는 모든 일에서 최선을 다한다."
        ]; //

        // 역채점 번호
        const reverseItems = [1, 3, 9, 12, 14, 15, 16, 18, 23, 24, 27, 29, 30, 31, 33, 38, 39, 42, 44, 45, 46, 48, 54, 55, 57, 59];

        // --- 초기화 ---
        function init() {
            const bContainer = document.getElementById('big5-questions');
            big5Questions.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = "pb-6 border-b border-slate-50";
                div.innerHTML = `
                    <p class="font-medium text-lg mb-4 text-slate-700">${i+1}. ${q}</p>
                    <div class="flex justify-between max-w-md">
                        ${[1, 2, 3, 4, 5].map(v => `
                            <label class="flex flex-col items-center cursor-pointer group">
                                <input type="radio" name="b${i+1}" value="${v}" required class="w-5 h-5 accent-indigo-600">
                                <span class="text-[10px] text-slate-400 mt-1">${v === 1 ? '전혀 아니다' : v === 5 ? '매우 그렇다' : v}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                bContainer.appendChild(div);
            });
        }

        // --- Big5 계산 ---
        function calculateBig5() {
            const form = new FormData(document.getElementById('big5-form'));
            let n = 0, e = 0, o = 0, a = 0, c = 0;

            for(let i=1; i<=60; i++) {
                let val = parseInt(form.get(`b${i}`));
                if(!val) { alert(`${i}번 질문에 답해주세요!`); return; }
                if(reverseItems.includes(i)) val = 6 - val; // 역채점

                if([1,6,11,16,21,26,31,36,41,46,51,56].includes(i)) n += val;
                else if([2,7,12,17,22,27,32,37,42,47,52,57].includes(i)) e += val;
                else if([3,8,13,18,23,28,33,38,43,48,53,58].includes(i)) o += val;
                else if([4,9,14,19,24,29,34,39,44,49,54,59].includes(i)) a += val;
                else if([5,10,15,20,25,30,35,40,45,50,55,60].includes(i)) c += val;
            }

            showReport('Big5 성격 분석 결과', ['신경증', '외향성', '개방성', '친화성', '성실성'], [n, e, o, a, c], 'indigo');
        }

        // --- 시각화 및 리포트 ---
        function showReport(title, labels, data, themeColor) {
            document.querySelectorAll('.test-section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('report-area').classList.remove('hidden-section');
            
            document.getElementById('report-content').innerHTML = `
                <h2 class="text-3xl font-bold text-slate-900 mb-2">${title}</h2>
                <p class="text-slate-500">분석 일시: ${new Date().toLocaleString()}</p>
                <div class="mt-6 grid grid-cols-2 md:grid-cols-5 gap-4">
                    ${labels.map((l, i) => `
                        <div class="bg-slate-50 p-4 rounded-xl text-center border border-slate-100">
                            <p class="text-xs text-slate-400 font-medium mb-1">${l}</p>
                            <p class="text-2xl font-bold text-indigo-600">${data[i]}점</p>
                        </div>
                    `).join('')}
                </div>
            `;

            // 차트 생성
            const ctx = document.getElementById('resultChart').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '획득 점수',
                        data: data,
                        backgroundColor: themeColor === 'indigo' ? 'rgba(79, 70, 229, 0.8)' : 'rgba(16, 185, 129, 0.8)',
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { min: 12, max: 60 } }
                }
            });

            // 아키타입 로직 (성실성/외향성 기준 예시)
            let archeName = "균형 잡힌 중재자";
            if(data[4] > 45) archeName = "철저한 완벽주의자";
            else if(data[1] > 40) archeName = "열정적인 활동가";

            document.getElementById('archetype-card').innerHTML = `
                <div class="bg-slate-900 text-white p-8 rounded-2xl flex flex-col md:flex-row items-center gap-6">
                    <div class="w-20 h-20 bg-indigo-500 rounded-full flex items-center justify-center text-3xl font-bold">A</div>
                    <div>
                        <h3 class="text-2xl font-bold mb-1">${archeName}</h3>
                        <p class="text-slate-400">당신은 책임감이 강하고 사회적 관계에서 에너지를 얻는 유형입니다.</p>
                    </div>
                </div>
            `;

            window.scrollTo(0, 0);
        }

        function saveReport() {
            html2canvas(document.getElementById('report-capture')).then(canvas => {
                const link = document.createElement('a');
                link.download = '심리분석_리포트.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function showTest(type) {
            document.querySelectorAll('.test-section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById('report-area').classList.add('hidden-section');
            document.getElementById(`section-${type}`).classList.remove('hidden-section');
        }

        init();
    </script>
</body>
</html>
